<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="portrait" />
  <title>Neon Breakout</title>
  <style>
    :root {
      --hud-pad: 12px;
      --hud-font: 14px;
      --btn-h: 44px;
      --btn-w: 56px;
      --radius: 10px;
      --panel-gap: 8px;
      --warm: #FFF5E4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0a0e2e;
      color: var(--warm);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      user-select: none;
    }

    #gameWrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #hud {
      position: absolute;
      left: 0;
      right: 0;
      top: env(safe-area-inset-top, 0px);
      padding: var(--hud-pad);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--panel-gap);
      pointer-events: none;
      z-index: 6;
    }

    .panel {
      background: rgba(8, 16, 48, 0.8);
      border: 1px solid rgba(0, 170, 255, 0.35);
      border-radius: var(--radius);
      color: #FFF5E4;
      pointer-events: auto;
    }

    #stats {
      display: flex;
      align-items: center;
      gap: calc(var(--hud-font) * 0.8);
      padding: calc(var(--hud-font) * 0.6) calc(var(--hud-font) * 0.7);
      font-size: var(--hud-font);
      text-shadow: 0 0 5px rgba(255, 210, 120, 0.35);
    }

    #lives { color: #FF7EA8; letter-spacing: 1px; }

    #btns {
      display: flex;
      gap: calc(var(--panel-gap) * 0.8);
      pointer-events: auto;
    }

    .btn {
      min-width: var(--btn-w);
      min-height: var(--btn-h);
      padding: 0 calc(var(--btn-w) * 0.18);
      border-radius: var(--radius);
      border: 1px solid rgba(0, 190, 255, 0.45);
      background: rgba(10, 24, 62, 0.92);
      color: #FFF5E4;
      font-size: calc(var(--hud-font) * 0.86);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .btn:active { transform: scale(0.98); }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: grid;
      place-items: center;
      padding: calc(var(--hud-pad) * 1.2);
      background: rgba(5, 10, 40, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #overlay.show { opacity: 1; pointer-events: auto; }

    #modal {
      width: min(94vw, 480px);
      text-align: center;
      padding: calc(var(--hud-font) * 1.2);
    }

    #modal h1 {
      margin: 0 0 calc(var(--hud-font) * 0.55);
      font-size: calc(var(--hud-font) * 2.05);
      color: #E9F8FF;
    }

    #modal p {
      margin: 0 0 calc(var(--hud-font) * 0.9);
      font-size: calc(var(--hud-font) * 1.02);
      line-height: 1.32;
      color: #CFEFFF;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: calc(var(--panel-gap) * 0.9);
      flex-wrap: wrap;
    }

    #rotateOverlay {
      position: absolute;
      inset: 0;
      z-index: 14;
      display: none;
      place-items: center;
      text-align: center;
      padding: calc(var(--hud-pad) * 1.4);
      background: rgba(5, 10, 40, 0.95);
      color: #E3F4FF;
      font-size: calc(var(--hud-font) * 1.2);
    }

    #toast {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + var(--btn-h) + var(--hud-pad) * 1.1);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      padding: calc(var(--hud-font) * 0.45) calc(var(--hud-font) * 0.72);
      border-radius: var(--radius);
      border: 1px solid rgba(0, 170, 255, 0.4);
      background: rgba(8, 18, 48, 0.94);
      color: #D9F3FF;
      font-size: calc(var(--hud-font) * 0.9);
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }

    #toast.show { opacity: 1; }

    #splash {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      color: #E5F6FF;
      font-size: calc(var(--hud-font) * 1.9);
      font-weight: 900;
      line-height: 1.15;
      white-space: pre-line;
    }

    .splash-animate { animation: splashInOut 1.15s ease; }

    @keyframes splashInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      25% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06); }
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="stats" class="panel">
        <div id="score">Score: 0</div>
        <div id="level">Level: 1</div>
        <div id="lives">❤❤❤</div>
        <div id="hi">Hi: 0</div>
      </div>
      <div id="btns">
        <button id="muteBtn" class="btn">Mute</button>
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="restartBtn" class="btn">Restart</button>
      </div>
    </div>

    <div id="toast"></div>
    <div id="splash"></div>

    <div id="overlay">
      <div id="modal" class="panel">
        <h1 id="modalTitle">Neon Breakout</h1>
        <p id="modalText"></p>
        <div id="overlayButtons" class="row"></div>
      </div>
    </div>

    <div id="rotateOverlay">Please rotate to portrait mode.<br />Game paused.</div>
  </div>

  <script>
    "use strict";

    // -----------------------------
    // Utilities
    // -----------------------------
    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
    const rand = (a, b) => Math.random() * (b - a) + a;
    const pick = (arr) => arr[(Math.random() * arr.length) | 0];
    function roundRectPath(c, x, y, w, h, r) {
      const rr = Math.min(r, w * 0.5, h * 0.5);
      c.beginPath();
      c.moveTo(x + rr, y);
      c.arcTo(x + w, y, x + w, y + h, rr);
      c.arcTo(x + w, y + h, x, y + h, rr);
      c.arcTo(x, y + h, x, y, rr);
      c.arcTo(x, y, x + w, y, rr);
      c.closePath();
    }
    function withAlpha(color, alpha) {
      if (color.startsWith("#")) {
        const h = color.slice(1);
        if (h.length === 6) {
          const r = parseInt(h.slice(0, 2), 16);
          const g = parseInt(h.slice(2, 4), 16);
          const b = parseInt(h.slice(4, 6), 16);
          return `rgba(${r},${g},${b},${alpha})`;
        }
      }
      if (color.startsWith("rgb(")) {
        return color.replace("rgb(", "rgba(").replace(")", `,${alpha})`);
      }
      return `rgba(160,220,255,${alpha})`;
    }

    // -----------------------------
    // DOM
    // -----------------------------
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const livesEl = document.getElementById("lives");
    const hiEl = document.getElementById("hi");
    const muteBtn = document.getElementById("muteBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");

    const overlay = document.getElementById("overlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const overlayButtons = document.getElementById("overlayButtons");

    const toastEl = document.getElementById("toast");
    const splashEl = document.getElementById("splash");
    const rotateOverlay = document.getElementById("rotateOverlay");

    // -----------------------------
    // Storage Keys
    // -----------------------------
    const STORAGE_HI = "neon_breakout_hi_score";
    const STORAGE_SAVE = "neon_breakout_save_state_v4";
    const STORAGE_SEEN = "neon_breakout_seen_start";

    // -----------------------------
    // Game Constants
    // -----------------------------
    const POWERUPS = {
      multi: { name: "Chaos Mode", emoji: "🎱", color: "#2ca8ff", dur: 0 },
      expand: { name: "Thicc Stick", emoji: "➡️", color: "#5eff66", dur: 12 },
      shrink: { name: "Pencil Mode", emoji: "✏️", color: "#ff4b4b", dur: 10, negative: true },
      fire: { name: "Napalm", emoji: "🔥", color: "#ffd34a", dur: 5 },
      laser: { name: "Pew Pew", emoji: "🔫", color: "#d086ff", dur: 8 },
      life: { name: "One More Go", emoji: "❤️", color: "#ffffff", dur: 0 },
      slow: { name: "Chill Pill", emoji: "🧊", color: "#58dfff", dur: 6 },
      sticky: { name: "Glue Trap", emoji: "🍯", color: "#ff9b35", dur: 0 },
      shield: { name: "Safety Net", emoji: "🛡️", color: "#72ffe4", dur: 0 },
      bomb: { name: "The Nuke", emoji: "💣", color: "#ff7f2d", dur: 0 }
    };

    const BRICKS = {
      Glass: { hp: 1, color: "#a8daff", icon: "", particle: "#9fd8ff", pitch: 1.2 },
      Stone: { hp: 2, color: "#5b7fa6", icon: "🪨", particle: "#7ca2c8", pitch: 0.95 },
      Obsidian: { hp: 3, color: "#1a1a6e", edge: "#6d4cff", icon: "💀", particle: "#5f6be0", pitch: 0.8 },
      Titanium: { hp: 4, color: "#b0c4de", icon: "⚙️", particle: "#c5d6ea", pitch: 0.65 },
      Cursed: { hp: -1, color: "#003366", icon: "🔒", particle: "#4bb5ff", pitch: 0.5 }
    };

    const LEVEL_NAMES = [
      "Blue Wake", "Cold Circuit", "Neon Drift", "The Gravel Pit", "Lockline",
      "Stone Pressure", "Drifter Zone", "Titanium Jungle", "Respawn Rift", "Abyss Net"
    ];

    const LEVEL_TAUNTS = [
      "Warmup is over.", "Stay centered.", "Angles win games.", "Think you can handle this?", "Cursed walls ahead.",
      "No panic swings.", "Everything moves now.", "Heavy metal weather.", "Bricks fight back.", "This one bites."
    ];

    // -----------------------------
    // Runtime State
    // -----------------------------
    let W = 360;
    let H = 640;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    const metrics = {
      paddleW: 64,
      paddleH: 14,
      ballR: 6,
      brickPadX: 18,
      brickGap: 4,
      topY: 84,
      hudFont: 14,
      hudPad: 10,
      btnH: 42,
      btnW: 56,
      hudH: 60,
      baseSpeed: 300,
      speedRamp: 2.8
    };

    const game = {
      paused: true,
      state: "ready",
      score: 0,
      highScore: Number(localStorage.getItem(STORAGE_HI) || 0),
      level: 1,
      lives: 3,
      pointerX: 180,
      shake: 0,
      muted: false,
      started: false,
      comboHits: 0,
      comboMulti: 1,
      comboTimer: 0,
      comboFlash: 0,
      flash: 0,
      nextSpeedTick: 5.5,
      regenTimer: 20,
      shieldActive: false,
      pauseReason: "",
      overlayLock: false,
      bricks: [],
      balls: [],
      lasers: [],
      powerups: [],
      particles: [],
      trails: [],
      popups: [],
      powerTimers: { fire: 0, laser: 0, slow: 0, expand: 0, shrink: 0 },
      powerMax: { fire: 5, laser: 8, slow: 6, expand: 12, shrink: 10 },
      powerState: {
        stickyPaddle: false,
        bombArmed: false,
        shieldCharges: 0,
        shieldMaxCharges: 0,
        sizeMode: null,
        sizeOriginalW: 0
      },
      paddle: { x: 120, y: 560, w: 70, h: 14 },
      lastPaddleSpriteW: 0,
      assets: {
        bg: null,
        ball: null,
        paddle: null,
        brickSprites: {},
        cracks: []
      },
      twinkles: []
    };

    // -----------------------------
    // Audio
    // -----------------------------
    const Audio = (() => {
      const A = { ctx: null, muted: false };
      const ensure = () => {
        if (!A.ctx) {
          const ACtx = window.AudioContext || window.webkitAudioContext;
          A.ctx = ACtx ? new ACtx() : null;
        }
        if (A.ctx && A.ctx.state === "suspended") A.ctx.resume();
      };
      const tone = (type, f0, f1, t, g, when = 0) => {
        if (A.muted) return;
        ensure();
        if (!A.ctx) return;
        const now = A.ctx.currentTime + when;
        const osc = A.ctx.createOscillator();
        const gn = A.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f0, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(35, f1), now + t);
        gn.gain.setValueAtTime(0.0001, now);
        gn.gain.exponentialRampToValueAtTime(g, now + 0.01);
        gn.gain.exponentialRampToValueAtTime(0.0001, now + t);
        osc.connect(gn).connect(A.ctx.destination);
        osc.start(now);
        osc.stop(now + t + 0.02);
      };
      A.brickHit = (p = 1) => tone("square", 860 * p, 590 * p, 0.08, 0.08);
      A.paddleHit = () => tone("triangle", 180, 130, 0.11, 0.13);
      A.powerup = () => {
        tone("sine", 430, 560, 0.09, 0.08, 0.0);
        tone("sine", 560, 760, 0.1, 0.08, 0.08);
        tone("sine", 760, 960, 0.12, 0.08, 0.16);
      };
      A.lifeLost = () => {
        tone("sawtooth", 410, 220, 0.16, 0.12, 0);
        tone("sawtooth", 250, 120, 0.25, 0.11, 0.15);
      };
      A.levelComplete = () => {
        tone("triangle", 530, 700, 0.12, 0.09, 0);
        tone("triangle", 700, 920, 0.12, 0.09, 0.14);
        tone("triangle", 920, 1220, 0.2, 0.09, 0.28);
      };
      A.gameOver = () => {
        tone("sawtooth", 520, 250, 0.22, 0.11, 0);
        tone("sawtooth", 250, 120, 0.34, 0.11, 0.2);
      };
      A.laser = () => tone("square", 1200, 830, 0.05, 0.07);
      return A;
    })();

    function vibrate(ms) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    // -----------------------------
    // Layout + Offscreen Assets
    // -----------------------------
    function updateRootVars() {
      const root = document.documentElement;
      root.style.setProperty("--hud-pad", `${metrics.hudPad}px`);
      root.style.setProperty("--hud-font", `${metrics.hudFont}px`);
      root.style.setProperty("--btn-h", `${metrics.btnH}px`);
      root.style.setProperty("--btn-w", `${metrics.btnW}px`);
      root.style.setProperty("--radius", `${Math.max(6, Math.round(W * 0.018))}px`);
      root.style.setProperty("--panel-gap", `${Math.max(5, Math.round(W * 0.02))}px`);
    }

    function computeMetrics() {
      metrics.paddleW = W * 0.18;
      metrics.paddleH = Math.max(H * 0.022, W * 0.018);
      metrics.ballR = W * 0.015;
      metrics.brickPadX = W * 0.05;
      metrics.brickGap = Math.max(2, W * 0.008);
      metrics.hudFont = Math.max(11, W * 0.034);
      metrics.hudPad = Math.max(8, W * 0.022);
      metrics.btnH = Math.max(36, H * 0.062);
      metrics.btnW = Math.max(48, W * 0.12);
      metrics.hudH = metrics.hudPad * 2 + metrics.btnH;
      metrics.topY = metrics.hudH + H * 0.03;
      metrics.baseSpeed = W * 0.95;
      metrics.speedRamp = W * 0.009;
    }

    function createCanvas(w, h) {
      const c = document.createElement("canvas");
      c.width = Math.max(1, Math.floor(w));
      c.height = Math.max(1, Math.floor(h));
      return c;
    }

    function buildStaticBackground() {
      const c = createCanvas(W, H);
      const cctx = c.getContext("2d");
      cctx.fillStyle = "#0a0e2e";
      cctx.fillRect(0, 0, W, H);

      const starCount = Math.floor((W * H) / 9000);
      for (let i = 0; i < starCount; i++) {
        const x = rand(0, W);
        const y = rand(0, H);
        const s = Math.random() < 0.8 ? 1 : 2;
        const a = rand(0.25, 0.95);
        cctx.fillStyle = `rgba(180,220,255,${a})`;
        cctx.fillRect(x, y, s, s);
      }

      // Static, low-cost vignette strips for depth.
      cctx.fillStyle = "rgba(0,20,70,0.18)";
      cctx.fillRect(0, 0, W, H * 0.12);
      cctx.fillRect(0, H * 0.86, W, H * 0.14);

      game.assets.bg = c;

      // Tiny animated twinkles (very small count, cheap runtime update).
      game.twinkles = [];
      const twinkleCount = Math.max(12, Math.floor((W * H) / 26000));
      for (let i = 0; i < twinkleCount; i++) {
        game.twinkles.push({
          x: rand(0, W),
          y: rand(0, H),
          s: Math.random() < 0.8 ? 1 : 2,
          phase: rand(0, Math.PI * 2),
          speed: rand(0.8, 1.8)
        });
      }
    }

    function buildBallSprite() {
      const r = metrics.ballR;
      const d = Math.ceil(r * 3.2);
      const c = createCanvas(d, d);
      const cctx = c.getContext("2d");
      const cx = d / 2;
      const cy = d / 2;

      // Pre-rendered glow + core
      const g = cctx.createRadialGradient(cx, cy, r * 0.25, cx, cy, r * 1.45);
      g.addColorStop(0, "rgba(255,255,255,1)");
      g.addColorStop(0.65, "rgba(215,245,255,0.9)");
      g.addColorStop(1, "rgba(0,200,255,0.15)");
      cctx.fillStyle = g;
      cctx.beginPath();
      cctx.arc(cx, cy, r * 1.45, 0, Math.PI * 2);
      cctx.fill();

      cctx.fillStyle = "#ffffff";
      cctx.beginPath();
      cctx.arc(cx, cy, r, 0, Math.PI * 2);
      cctx.fill();

      game.assets.ball = c;
    }

    function buildPaddleSprite(width, height) {
      const c = createCanvas(width, height);
      const cctx = c.getContext("2d");
      const g = cctx.createLinearGradient(0, 0, width, 0);
      g.addColorStop(0, "#00d4ff");
      g.addColorStop(1, "#0055ff");
      cctx.fillStyle = g;
      roundRectPath(cctx, 0, 0, width, height, Math.max(2, height * 0.35));
      cctx.fill();
      cctx.fillStyle = "rgba(255,255,255,0.2)";
      cctx.fillRect(width * 0.06, 0, width * 0.88, Math.max(2, height * 0.23));
      cctx.fillStyle = "rgba(255,255,255,0.3)";
      cctx.fillRect(0, height * 0.2, Math.max(2, width * 0.03), height * 0.6);
      cctx.fillRect(width - Math.max(2, width * 0.03), height * 0.2, Math.max(2, width * 0.03), height * 0.6);
      cctx.strokeStyle = "#ffffff";
      cctx.lineWidth = Math.max(1, width * 0.012);
      roundRectPath(cctx, cctx.lineWidth * 0.5, cctx.lineWidth * 0.5, width - cctx.lineWidth, height - cctx.lineWidth, Math.max(2, height * 0.35));
      cctx.stroke();
      game.assets.paddle = c;
      game.lastPaddleSpriteW = width;
    }

    function buildBrickAssets(brickW, brickH) {
      const sprites = {};
      for (const name of Object.keys(BRICKS)) {
        const def = BRICKS[name];
        const c = createCanvas(brickW, brickH);
        const cctx = c.getContext("2d");
        cctx.fillStyle = def.color;
        cctx.fillRect(0, 0, brickW, brickH);
        cctx.strokeStyle = "rgba(220,245,255,0.25)";
        cctx.lineWidth = Math.max(1, brickW * 0.02);
        cctx.strokeRect(cctx.lineWidth * 0.5, cctx.lineWidth * 0.5, brickW - cctx.lineWidth, brickH - cctx.lineWidth);
        cctx.fillStyle = "rgba(255,255,255,0.12)";
        cctx.fillRect(0, 0, brickW, Math.max(2, brickH * 0.2));

        if (name === "Obsidian") {
          cctx.strokeStyle = def.edge;
          cctx.lineWidth = Math.max(1, brickW * 0.03);
          cctx.strokeRect(cctx.lineWidth * 0.5, cctx.lineWidth * 0.5, brickW - cctx.lineWidth, brickH - cctx.lineWidth);
        }

        if (name === "Titanium") {
          cctx.fillStyle = "rgba(255,255,255,0.42)";
          cctx.fillRect(0, 0, brickW, Math.max(2, brickH * 0.25));
        }

        sprites[name] = c;
      }

      const cracks = [];
      for (let stage = 1; stage <= 3; stage++) {
        const c = createCanvas(brickW, brickH);
        const cctx = c.getContext("2d");
        cctx.strokeStyle = `rgba(255,255,255,${0.24 + stage * 0.18})`;
        cctx.lineWidth = Math.max(1, brickW * 0.012 * stage);
        const lines = 2 + stage * 2;
        for (let i = 0; i < lines; i++) {
          const x1 = rand(brickW * 0.1, brickW * 0.9);
          const y1 = rand(brickH * 0.1, brickH * 0.9);
          const x2 = x1 + rand(-brickW * 0.24, brickW * 0.24);
          const y2 = y1 + rand(brickH * 0.1, brickH * 0.34);
          cctx.beginPath();
          cctx.moveTo(x1, y1);
          cctx.lineTo(x2, y2);
          cctx.stroke();
        }
        cracks.push(c);
      }

      game.assets.brickSprites = sprites;
      game.assets.cracks = cracks;
    }

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      computeMetrics();
      updateRootVars();

      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = `${W}px`;
      canvas.style.height = `${H}px`;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      game.paddle.w = metrics.paddleW;
      game.paddle.h = metrics.paddleH;
      game.paddle.y = H - game.paddle.h - H * 0.036;
      game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);

      buildStaticBackground();
      buildBallSprite();
      buildPaddleSprite(game.paddle.w, game.paddle.h);

      if (game.bricks.length) {
        const any = game.bricks[0];
        buildBrickAssets(any.w, any.h);
      }

      handleOrientation();
    }

    // -----------------------------
    // Overlay / UI
    // -----------------------------
    function showSplash(text) {
      splashEl.textContent = text;
      splashEl.classList.remove("splash-animate");
      void splashEl.offsetWidth;
      splashEl.classList.add("splash-animate");
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => toastEl.classList.remove("show"), 1500);
    }

    function showOverlay(title, text, buttons) {
      modalTitle.textContent = title;
      modalText.innerHTML = text;
      overlayButtons.innerHTML = "";
      buttons.forEach((b) => {
        const el = document.createElement("button");
        el.className = "btn";
        el.textContent = b.label;
        el.onclick = b.onClick;
        overlayButtons.appendChild(el);
      });
      overlay.classList.add("show");
      game.paused = true;
      updateHUD();
    }

    function hideOverlay() {
      overlay.classList.remove("show");
      game.paused = false;
      updateHUD();
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${game.score}`;
      levelEl.textContent = `Level: ${game.level}`;
      livesEl.textContent = "❤".repeat(Math.max(0, game.lives));
      hiEl.textContent = `Hi: ${Math.max(game.highScore, game.score)}`;
      muteBtn.textContent = Audio.muted ? "Unmute" : "Mute";
      pauseBtn.textContent = game.paused ? "Resume" : "Pause";
    }

    function handleOrientation() {
      const landscape = W > H;
      rotateOverlay.style.display = landscape ? "grid" : "none";
      if (landscape && !game.paused && game.state !== "gameOver") {
        saveGame();
        showOverlay("Paused", "Please rotate to portrait, then tap Resume.", [
          { label: "Resume", onClick: () => { if (window.innerWidth <= window.innerHeight) hideOverlay(); } },
          { label: "Restart", onClick: () => restartImmediate() }
        ]);
      }
    }

    // -----------------------------
    // Save/Load
    // -----------------------------
    function clearSave() {
      localStorage.removeItem(STORAGE_SAVE);
    }

    function saveGame() {
      if (game.score > game.highScore) {
        game.highScore = game.score;
        localStorage.setItem(STORAGE_HI, String(game.highScore));
      }
      const data = {
        level: game.level,
        score: game.score,
        lives: game.lives,
        highScore: game.highScore,
        state: game.state,
        nextSpeedTick: game.nextSpeedTick,
        comboHits: game.comboHits,
        comboMulti: game.comboMulti,
        regenTimer: game.regenTimer,
        shieldActive: game.shieldActive,
        powerState: { ...game.powerState },
        paddle: { x: game.paddle.x, w: game.paddle.w },
        bricks: game.bricks.map((b) => ({ ...b })),
        balls: game.balls.map((b) => ({ ...b })),
        powerups: game.powerups.map((p) => ({ ...p })),
        powerTimers: { ...game.powerTimers }
      };
      localStorage.setItem(STORAGE_SAVE, JSON.stringify(data));
    }

    function loadSave() {
      const raw = localStorage.getItem(STORAGE_SAVE);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.bricks) || !Array.isArray(parsed.balls)) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    // -----------------------------
    // Level Generation and Setup
    // -----------------------------
    function levelBaseSpeed(level) {
      return metrics.baseSpeed * Math.pow(1.04, level - 1);
    }

    function getBallSpeed() {
      return levelBaseSpeed(game.level) * (game.powerTimers.slow > 0 ? 0.72 : 1);
    }

    function weightedBrickType(level) {
      const t = Math.min(level, 20);
      const weights = [
        { type: "Glass", w: Math.max(40 - t * 2, 8) },
        { type: "Stone", w: 28 + t * 1.0 },
        { type: "Obsidian", w: 18 + t * 1.2 },
        { type: "Titanium", w: 7 + t * 1.5 }
      ];
      const total = weights.reduce((s, i) => s + i.w, 0);
      let r = rand(0, total);
      for (const w of weights) {
        r -= w.w;
        if (r <= 0) return w.type;
      }
      return "Glass";
    }

    function buildLevel(level) {
      game.bricks.length = 0;
      const rows = clamp(4 + Math.floor(level * 0.5), 4, 8);
      const cols = clamp(8 + Math.floor(level * 0.35), 8, 12);
      const gap = metrics.brickGap;
      const padX = metrics.brickPadX; // 5% each side
      const usableW = W - padX * 2 - gap * (cols - 1);
      const brickW = usableW / cols;
      const brickH = H * 0.038;
      const topY = metrics.topY;

      const cursedTarget = level >= 5 ? Math.min(Math.floor(level - 4), Math.floor(rows * cols * 0.17)) : 0;
      let cursedPlaced = 0;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const holeChance = 0.08 + Math.min(0.1, level * 0.008);
          if (Math.random() < holeChance) continue;

          let type;
          if (level >= 5 && cursedPlaced < cursedTarget && Math.random() < (0.045 + level * 0.008)) {
            type = "Cursed";
            cursedPlaced++;
          } else {
            type = weightedBrickType(level);
          }

          const drifting = level >= 7 && type !== "Cursed" && Math.random() < (0.14 + Math.min(0.2, (level - 7) * 0.03));

          const x = padX + c * (brickW + gap);
          const y = topY + r * (brickH + gap);
          const hp = BRICKS[type].hp;
          game.bricks.push({
            x, y, baseX: x, w: brickW, h: brickH,
            type,
            hp,
            maxHp: hp,
            alive: true,
            driftAmp: drifting ? rand(W * 0.01, W * 0.03) : 0,
            driftSpeed: drifting ? rand(0.7, 1.4) : 0,
            driftPhase: rand(0, Math.PI * 2)
          });
        }
      }

      buildBrickAssets(brickW, brickH);
    }

    function resetTransient() {
      game.powerups.length = 0;
      game.lasers.length = 0;
      game.particles.length = 0;
      game.trails.length = 0;
      game.popups.length = 0;
      game.comboHits = 0;
      game.comboMulti = 1;
      game.comboFlash = 0;
      game.regenTimer = 20;
      game.shieldActive = false;
      game.powerState.stickyPaddle = false;
      game.powerState.bombArmed = false;
      game.powerState.shieldCharges = 0;
      game.powerState.shieldMaxCharges = 0;
      game.powerState.sizeMode = null;
      game.powerState.sizeOriginalW = 0;
      for (const k of Object.keys(game.powerTimers)) game.powerTimers[k] = 0;
    }

    function spawnBall(stuck = true, dirX = rand(-0.45, 0.45)) {
      const target = getBallSpeed();
      const speed = target * 0.82;
      game.balls.push({
        x: game.paddle.x + game.paddle.w * 0.5,
        y: game.paddle.y - metrics.ballR - H * 0.003,
        vx: speed * dirX,
        vy: -speed,
        r: metrics.ballR,
        stuck,
        stuckOffsetX: 0,
        fire: game.powerTimers.fire > 0,
        bomb: game.powerState.bombArmed,
        slowRestoreSpeed: game.powerTimers.slow > 0 ? (speed / 0.6) : 0,
        targetSpeed: target,
        launchRamp: 0.3
      });
    }

    function loadLevel(level, showIntro = true) {
      buildLevel(level);
      game.balls.length = 0;
      resetTransient();

      game.paddle.w = metrics.paddleW;
      game.paddle.h = metrics.paddleH;
      game.paddle.y = H - game.paddle.h - H * 0.036;
      game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);
      buildPaddleSprite(game.paddle.w, game.paddle.h);

      spawnBall(true);
      game.state = "ready";
      game.nextSpeedTick = 5.5;
      updateHUD();

      if (showIntro) {
        const idx = (level - 1) % LEVEL_NAMES.length;
        showSplash(`Level ${level} — ${LEVEL_NAMES[idx]}\n${LEVEL_TAUNTS[idx]}`);
      }
    }

    function restartImmediate() {
      clearSave();
      game.score = 0;
      game.lives = 3;
      game.level = 1;
      game.started = true;
      loadLevel(1, false);
      overlay.classList.remove("show");
      game.paused = false;
      updateHUD();
    }

    function restoreFromSave(data) {
      game.level = data.level || 1;
      game.score = data.score || 0;
      game.lives = data.lives || 3;
      game.highScore = Math.max(game.highScore, data.highScore || 0);
      game.state = data.state || "playing";
      game.nextSpeedTick = data.nextSpeedTick || 5.5;
      game.comboHits = data.comboHits || 0;
      game.comboMulti = data.comboMulti || 1;
      game.regenTimer = data.regenTimer || 20;
      game.shieldActive = !!data.shieldActive;
      game.powerState = { ...game.powerState, ...(data.powerState || {}) };

      game.bricks = (data.bricks || []).map((b) => ({ ...b }));
      game.balls = (data.balls || []).map((b) => ({
        ...b,
        r: metrics.ballR,
        stuckOffsetX: b.stuckOffsetX || 0,
        slowRestoreSpeed: b.slowRestoreSpeed || 0
      }));
      game.powerups = (data.powerups || []).map((p) => ({ ...p }));
      if (data.powerTimers) {
        for (const k of Object.keys(game.powerTimers)) {
          if (typeof data.powerTimers[k] === "number") game.powerTimers[k] = data.powerTimers[k];
        }
      }

      game.paddle.w = data.paddle?.w || metrics.paddleW;
      game.paddle.h = metrics.paddleH;
      game.paddle.y = H - game.paddle.h - H * 0.036;
      game.paddle.x = clamp(data.paddle?.x || W * 0.5, 0, W - game.paddle.w);
      if (game.bricks.length) buildBrickAssets(game.bricks[0].w, game.bricks[0].h);
      buildPaddleSprite(game.paddle.w, game.paddle.h);
      if (!game.balls.length) spawnBall(true);

      showOverlay("Welcome Back!", "Saved run detected. Continue where you left off?", [
        {
          label: "▶️ Continue",
          onClick: () => {
            overlay.classList.remove("show");
            if (game.state !== "ready") game.state = "playing";
            game.paused = false;
            updateHUD();
            saveGame();
          }
        },
        {
          label: "🔄 New Game",
          onClick: () => restartImmediate()
        }
      ]);
    }

    // -----------------------------
    // Input
    // -----------------------------
    function setPointer(x) {
      game.pointerX = clamp(x, 0, W);
      game.paddle.x = clamp(game.pointerX - game.paddle.w * 0.5, 0, W - game.paddle.w);
      if (game.state === "ready" || game.balls.some((b) => b.stuck)) {
        for (const b of game.balls) {
          if (!b.stuck) continue;
          b.x = game.paddle.x + game.paddle.w * 0.5 + (b.stuckOffsetX || 0);
          b.y = game.paddle.y - b.r - H * 0.003;
        }
      }
    }

    function onPress() {
      Audio.brickHit(1);
      if (game.paused) return;
      if (game.balls.some((b) => b.stuck)) {
        if (game.state === "ready") game.state = "playing";
        launchOneStuckBall();
        return;
      }
      if (game.powerTimers.laser > 0) fireLasers();
    }

    function fireLasers() {
      const y = game.paddle.y - H * 0.012;
      const laserW = Math.max(2, W * 0.008);
      const laserH = Math.max(12, H * 0.03);
      game.lasers.push({ x: game.paddle.x + W * 0.02, y, vy: -H * 1.25, w: laserW, h: laserH, alive: true });
      game.lasers.push({ x: game.paddle.x + game.paddle.w - W * 0.02, y, vy: -H * 1.25, w: laserW, h: laserH, alive: true });
      Audio.laser();
    }

    // -----------------------------
    // Gameplay Helpers
    // -----------------------------
    function nonStuckBallCount() {
      return Math.max(1, game.balls.filter((b) => !b.stuck).length);
    }

    function clearBombArmed() {
      game.powerState.bombArmed = false;
      game.balls.forEach((b) => { b.bomb = false; });
    }

    function clearTimedPowerups() {
      game.powerTimers.fire = 0;
      game.powerTimers.laser = 0;
      game.powerTimers.slow = 0;
      game.powerTimers.expand = 0;
      game.powerTimers.shrink = 0;
      game.lasers.length = 0;
      game.balls.forEach((b) => {
        b.fire = false;
        b.bomb = false;
        b.slowRestoreSpeed = 0;
      });
      game.powerState.stickyPaddle = false;
      game.powerState.bombArmed = false;
      game.powerState.sizeMode = null;
      game.powerState.sizeOriginalW = 0;
    }

    function resetForLifeLoss() {
      clearTimedPowerups();
      game.shieldActive = false;
      game.powerState.shieldCharges = 0;
      game.powerState.shieldMaxCharges = 0;
      game.nextSpeedTick = 5.5;
      game.powerups.length = 0;
      game.lasers.length = 0;
      game.trails.length = 0;
      game.paddle.w = metrics.paddleW;
      game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);
      buildPaddleSprite(game.paddle.w, game.paddle.h);
    }

    function stickBallToPaddle(ball) {
      const center = game.paddle.x + game.paddle.w * 0.5;
      ball.stuck = true;
      ball.vx = 0;
      ball.vy = 0;
      ball.stuckOffsetX = clamp(ball.x - center, -game.paddle.w * 0.45, game.paddle.w * 0.45);
    }

    function launchOneStuckBall() {
      const stuckBalls = game.balls.filter((b) => b.stuck);
      if (!stuckBalls.length) return false;
      const b = stuckBalls[0];
      const rel = clamp((b.x - (game.paddle.x + game.paddle.w * 0.5)) / (game.paddle.w * 0.5), -1, 1);
      const angle = -Math.PI * 0.5 + rel * 1.15;
      const target = getBallSpeed();
      const speed = target * 0.82;
      b.vx = Math.cos(angle) * speed;
      b.vy = Math.sin(angle) * speed;
      b.targetSpeed = target;
      b.launchRamp = 0.3;
      b.stuck = false;
      b.stuckOffsetX = 0;
      if (game.powerState.stickyPaddle) game.powerState.stickyPaddle = false;
      return true;
    }

    function maybeDropPowerup(x, y) {
      if (Math.random() > 0.28) return;
      const negBoost = 1 + (game.level - 1) * 0.08;
      const pool = [
        { t: "multi", w: 1.0 }, { t: "expand", w: 1.0 }, { t: "shrink", w: 0.55 * negBoost },
        { t: "fire", w: 0.9 }, { t: "laser", w: 0.82 }, { t: "life", w: 0.5 },
        { t: "slow", w: 0.8 }, { t: "sticky", w: 0.8 }, { t: "shield", w: 0.52 }, { t: "bomb", w: 0.62 }
      ];
      const total = pool.reduce((s, p) => s + p.w, 0);
      let r = rand(0, total);
      let type = "multi";
      for (const p of pool) {
        r -= p.w;
        if (r <= 0) { type = p.t; break; }
      }

      game.powerups.push({
        type,
        x,
        y,
        w: W * 0.18,
        h: H * 0.032,
        vy: H * 0.18,
        alive: true
      });
    }

    function applyPowerup(type) {
      const p = POWERUPS[type];
      if (!p) return;

      if (type === "multi") {
        const src = game.balls.find((b) => !b.stuck) || game.balls[0];
        if (src) {
          const baseA = Math.atan2(src.vy || -1, src.vx || 0);
          const speed = Math.hypot(src.vx, src.vy) || getBallSpeed();
          const next = [];
          [-0.34, 0, 0.34].forEach((off) => {
            const a = baseA + off;
            next.push({
              x: src.x,
              y: src.y,
              r: metrics.ballR,
              vx: Math.cos(a) * speed,
              vy: Math.sin(a) * speed,
              stuck: false,
              stuckOffsetX: 0,
              fire: game.powerTimers.fire > 0,
              bomb: game.powerState.bombArmed,
              slowRestoreSpeed: game.powerTimers.slow > 0 ? (speed / 0.6) : 0,
              launchRamp: 0,
              targetSpeed: speed
            });
          });
          game.balls = next;
        }
      }
      if (type === "expand") {
        if (!game.powerState.sizeMode) game.powerState.sizeOriginalW = game.paddle.w;
        game.powerState.sizeMode = "expand";
        game.powerTimers.expand = game.powerMax.expand;
        game.powerTimers.shrink = 0;
      }
      if (type === "shrink") {
        if (!game.powerState.sizeMode) game.powerState.sizeOriginalW = game.paddle.w;
        game.powerState.sizeMode = "shrink";
        game.powerTimers.shrink = game.powerMax.shrink;
        game.powerTimers.expand = 0;
      }
      if (type === "fire") {
        game.powerTimers.fire = game.powerMax.fire;
        game.balls.forEach((b) => b.fire = true);
      }
      if (type === "laser") game.powerTimers.laser = game.powerMax.laser;
      if (type === "life") game.lives++;
      if (type === "slow") {
        if (game.powerTimers.slow <= 0) {
          game.balls.forEach((b) => {
            if (b.stuck) return;
            b.slowRestoreSpeed = Math.hypot(b.vx, b.vy);
            b.vx *= 0.6;
            b.vy *= 0.6;
            b.targetSpeed = (b.targetSpeed || getBallSpeed()) * 0.6;
          });
        }
        game.powerTimers.slow = game.powerMax.slow;
      }
      if (type === "sticky") {
        game.powerState.stickyPaddle = true;
      }
      if (type === "shield") {
        game.shieldActive = true;
        game.powerState.shieldMaxCharges = nonStuckBallCount();
        game.powerState.shieldCharges = game.powerState.shieldMaxCharges;
      }
      if (type === "bomb") {
        game.powerState.bombArmed = true;
        game.balls.forEach((b) => b.bomb = true);
      }

      game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);
      Audio.powerup();
      showToast(`${p.emoji} ${p.name.toUpperCase()} activated!`);
      updateHUD();
      saveGame();
    }

    function pushParticle(p) {
      if (game.particles.length >= 20) game.particles.shift();
      game.particles.push(p);
    }

    function spawnExplosion(x, y, color, n = 8) {
      for (let i = 0; i < n; i++) {
        pushParticle({
          x,
          y,
          vx: rand(-W * 0.35, W * 0.35),
          vy: rand(-H * 0.3, H * 0.06),
          life: rand(0.25, 0.55),
          t: 0,
          color,
          s: rand(W * 0.003, W * 0.008)
        });
      }
    }

    function addPopup(x, y, txt, color = "#d7f0ff") {
      game.popups.push({ x, y, txt, color, t: 0, life: 0.7 });
    }

    function bumpCombo() {
      game.comboHits++;
      game.comboTimer = 5;
      const next = 1 + Math.floor(game.comboHits / 5);
      if (next !== game.comboMulti) {
        game.comboMulti = next;
        game.comboFlash = 1.0;
        if (next >= 2) showToast(`x${next} COMBO!`);
      }
    }

    function damageBrick(brick, source, forceDestroy = false) {
      if (!brick.alive) return;
      const def = BRICKS[brick.type];

      if (brick.type === "Cursed") {
        Audio.brickHit(def.pitch);
      spawnExplosion(source.x, source.y, def.particle, 4);
      vibrate(8);
      return;
      }

      brick.hp = forceDestroy ? 0 : brick.hp - 1;
      const destroyed = brick.hp <= 0;

      if (destroyed) {
        brick.alive = false;
        const pts = brick.maxHp * 100 * game.comboMulti;
        game.score += pts;
        addPopup(source.x, source.y, `+${pts}`);
        spawnExplosion(brick.x + brick.w * 0.5, brick.y + brick.h * 0.5, def.particle, brick.type === "Titanium" ? 10 : 7);
        maybeDropPowerup(brick.x + brick.w * 0.5, brick.y + brick.h * 0.5);
        bumpCombo();
      } else {
        const pts = 50 * game.comboMulti;
        game.score += pts;
        addPopup(source.x, source.y, `+${pts}`, "#c5e4ff");
        spawnExplosion(source.x, source.y, def.particle, 5);
      }

      Audio.brickHit(def.pitch);
      vibrate(12);
      game.flash = Math.min(0.2, game.flash + (destroyed ? 0.055 : 0.03));
      updateHUD();
      saveGame();

      const anyBreakable = game.bricks.some((b) => b.alive && b.type !== "Cursed");
      if (!anyBreakable) {
        game.state = "levelClear";
        game.paused = true;
        Audio.levelComplete();

        if (game.score > game.highScore) {
          game.highScore = game.score;
          localStorage.setItem(STORAGE_HI, String(game.highScore));
        }

        if (game.level % 10 === 0) clearSave();
        else saveGame();

        showOverlay("Level Complete", "Ready for next level?", [
          {
            label: "Next",
            onClick: () => {
              game.level++;
              loadLevel(game.level, true);
              showOverlay(`Level ${game.level} — ${LEVEL_NAMES[(game.level - 1) % LEVEL_NAMES.length]}`, `${LEVEL_TAUNTS[(game.level - 1) % LEVEL_TAUNTS.length]}<br>Think you can handle this?`, [
                {
                  label: "Continue",
                  onClick: () => {
                    hideOverlay();
                    game.paused = false;
                    saveGame();
                  }
                }
              ]);
            }
          }
        ]);
      }
    }

    function bombExplosion(center, source) {
      const cx = center.x + center.w * 0.5;
      const cy = center.y + center.h * 0.5;
      spawnExplosion(cx, cy, "#7ab8ff", 10);
      addPopup(cx, cy, "BOOM", "#d3ebff");
      for (const b of game.bricks) {
        if (!b.alive || b.type === "Cursed") continue;
        const dx = Math.abs((b.x + b.w * 0.5) - cx);
        const dy = Math.abs((b.y + b.h * 0.5) - cy);
        if (dx <= center.w * 1.6 && dy <= center.h * 1.6) {
          damageBrick(b, source, true);
        }
      }
    }

    function loseLife() {
      game.lives--;
      game.shake = 0.35;
      game.flash = 0.14;
      Audio.lifeLost();
      vibrate(110);
      saveGame();

      if (game.lives <= 0) {
        game.state = "gameOver";
        game.paused = true;
        Audio.gameOver();

        if (game.score > game.highScore) {
          game.highScore = game.score;
          localStorage.setItem(STORAGE_HI, String(game.highScore));
        }

        clearSave();
        updateHUD();
        showOverlay("Game Over", `Score: ${game.score}<br>High Score: ${game.highScore}`, [
          { label: "Try Again", onClick: () => restartImmediate() }
        ]);
        return;
      }

      resetForLifeLoss();
      game.balls.length = 0;
      spawnBall(true);
      game.state = "ready";
      game.comboHits = 0;
      game.comboMulti = 1;
      updateHUD();
      showOverlay("Life Lost", "Tap Resume, then launch.", [
        { label: "Resume", onClick: () => hideOverlay() },
        { label: "Restart", onClick: () => restartImmediate() }
      ]);
    }

    // -----------------------------
    // Update Loop
    // -----------------------------
    function updateDrift(dt) {
      if (game.level < 7) return;
      const t = performance.now() * 0.001;
      for (const b of game.bricks) {
        if (!b.alive || !b.driftAmp) continue;
        b.x = b.baseX + Math.sin(t * b.driftSpeed + b.driftPhase) * b.driftAmp;
      }
    }

    function maybeRegenerate(dt) {
      if (game.level < 9 || game.state !== "playing") return;
      game.regenTimer -= dt;
      if (game.regenTimer > 0) return;
      game.regenTimer = 20;
      const dead = game.bricks.filter((b) => !b.alive && b.type !== "Cursed");
      if (!dead.length) return;
      const b = pick(dead);
      b.alive = true;
      b.hp = b.maxHp;
      spawnExplosion(b.x + b.w * 0.5, b.y + b.h * 0.5, BRICKS[b.type].particle, 6);
      addPopup(b.x + b.w * 0.5, b.y + b.h * 0.5, "REGEN", "#b5ddff");
    }

    function updateTimers(dt) {
      const prevFire = game.powerTimers.fire;
      const prevLaser = game.powerTimers.laser;
      const prevSlow = game.powerTimers.slow;
      const prevExpand = game.powerTimers.expand;
      const prevShrink = game.powerTimers.shrink;

      for (const k of Object.keys(game.powerTimers)) {
        if (game.powerTimers[k] > 0) game.powerTimers[k] -= dt;
        if (game.powerTimers[k] < 0) game.powerTimers[k] = 0;
      }

      if (prevFire > 0 && game.powerTimers.fire <= 0) {
        game.balls.forEach((b) => b.fire = false);
      }

      if (prevLaser > 0 && game.powerTimers.laser <= 0) {
        game.lasers.length = 0;
      }

      if (prevSlow > 0 && game.powerTimers.slow <= 0) {
        game.balls.forEach((b) => {
          if (b.stuck) return;
          const restore = b.slowRestoreSpeed || (Math.hypot(b.vx, b.vy) / 0.6);
          const a = Math.atan2(b.vy, b.vx);
          b.vx = Math.cos(a) * restore;
          b.vy = Math.sin(a) * restore;
          b.targetSpeed = restore;
          b.slowRestoreSpeed = 0;
        });
      }

      const sizeActive = game.powerTimers.expand > 0 || game.powerTimers.shrink > 0;
      if (sizeActive) {
        const target = game.powerState.sizeMode === "expand"
          ? clamp(W * 0.4, W * 0.18, W * 0.4)
          : clamp(W * 0.08, W * 0.08, W * 0.4);
        game.paddle.w += (target - game.paddle.w) * Math.min(1, dt * 10);
        game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);
        if (Math.abs(game.paddle.w - game.lastPaddleSpriteW) > W * 0.008) {
          buildPaddleSprite(game.paddle.w, game.paddle.h);
        }
      } else if (prevExpand > 0 || prevShrink > 0 || game.powerState.sizeMode) {
        const restoreW = game.powerState.sizeOriginalW || metrics.paddleW;
        game.paddle.w += (restoreW - game.paddle.w) * Math.min(1, dt * 10);
        game.paddle.x = clamp(game.paddle.x, 0, W - game.paddle.w);
        if (Math.abs(game.paddle.w - game.lastPaddleSpriteW) > W * 0.008) {
          buildPaddleSprite(game.paddle.w, game.paddle.h);
        }
        if (Math.abs(game.paddle.w - restoreW) < W * 0.003) {
          game.paddle.w = restoreW;
          game.powerState.sizeMode = null;
          game.powerState.sizeOriginalW = 0;
        }
      }

      if (game.comboTimer > 0) game.comboTimer -= dt;
      else {
        game.comboHits = 0;
        game.comboMulti = 1;
      }
      if (game.comboFlash > 0) game.comboFlash -= dt;
    }

    function ballPaddleCollision(ball) {
      const p = game.paddle;
      if (ball.y + ball.r < p.y || ball.y - ball.r > p.y + p.h || ball.x + ball.r < p.x || ball.x - ball.r > p.x + p.w) return;
      const rel = clamp((ball.x - (p.x + p.w * 0.5)) / (p.w * 0.5), -1, 1);
      const angle = -Math.PI * 0.5 + rel * 1.15;
      const speed = Math.max(getBallSpeed(), Math.hypot(ball.vx, ball.vy));
      ball.vx = Math.cos(angle) * speed;
      ball.vy = Math.sin(angle) * speed;
      ball.y = p.y - ball.r - H * 0.001;

      if (game.powerState.stickyPaddle) {
        stickBallToPaddle(ball);
      }

      game.comboHits = 0;
      game.comboMulti = 1;
      Audio.paddleHit();
    }

    function ballBrickCollision(ball) {
      for (const brick of game.bricks) {
        if (!brick.alive) continue;
        const cx = clamp(ball.x, brick.x, brick.x + brick.w);
        const cy = clamp(ball.y, brick.y, brick.y + brick.h);
        const dx = ball.x - cx;
        const dy = ball.y - cy;

        if ((dx * dx + dy * dy) > ball.r * ball.r) continue;

        const cursed = brick.type === "Cursed";
        if (!ball.fire || cursed) {
          const ox = ball.r - Math.abs(dx);
          const oy = ball.r - Math.abs(dy);
          if (ox < oy) ball.vx *= -1;
          else ball.vy *= -1;
        }

        if (ball.bomb && !cursed) {
          bombExplosion(brick, { x: ball.x, y: ball.y });
          clearBombArmed();
        } else {
          damageBrick(brick, { x: ball.x, y: ball.y }, ball.fire);
        }
        if (!ball.fire) break;
      }
    }

    function updateBalls(dt) {
      const remove = [];
      for (let i = 0; i < game.balls.length; i++) {
        const b = game.balls[i];
        if (b.stuck) {
          b.x = game.paddle.x + game.paddle.w * 0.5 + (b.stuckOffsetX || 0);
          b.y = game.paddle.y - b.r - H * 0.003;
          continue;
        }

        if (b.launchRamp > 0) {
          b.launchRamp -= dt;
          const t = 1 - clamp(b.launchRamp / 0.3, 0, 1);
          const target = b.targetSpeed || getBallSpeed();
          const desired = target * (0.82 + t * 0.18);
          const a = Math.atan2(b.vy, b.vx);
          b.vx = Math.cos(a) * desired;
          b.vy = Math.sin(a) * desired;
        }

        b.x += b.vx * dt;
        b.y += b.vy * dt;

        if (b.x - b.r <= 0) { b.x = b.r; b.vx = Math.abs(b.vx); }
        else if (b.x + b.r >= W) { b.x = W - b.r; b.vx = -Math.abs(b.vx); }

        if (b.y - b.r <= 0) { b.y = b.r; b.vy = Math.abs(b.vy); }

        if (b.y - b.r > H + H * 0.05) {
          if (game.shieldActive && game.powerState.shieldCharges > 0) {
            game.powerState.shieldCharges--;
            if (game.powerState.shieldCharges <= 0) {
              game.shieldActive = false;
              game.powerState.shieldMaxCharges = 0;
            }
            b.y = H - H * 0.04;
            b.vy = -Math.abs(b.vy);
            showToast("🛡️ Safety Net saved you!");
            saveGame();
          } else {
            remove.push(i);
          }
        }

        ballPaddleCollision(b);
        ballBrickCollision(b);

        game.trails.push({ x: b.x, y: b.y, r: b.r, t: 0, life: 0.3 });
        if (game.trails.length > 5) game.trails.shift();
      }

      for (let i = remove.length - 1; i >= 0; i--) game.balls.splice(remove[i], 1);
      if (game.balls.length === 0 && game.state === "playing") loseLife();
    }

    function updateLasers(dt) {
      for (const l of game.lasers) {
        if (!l.alive) continue;
        l.y += l.vy * dt;
        if (l.y + l.h < 0) l.alive = false;

        for (const b of game.bricks) {
          if (!b.alive) continue;
          if (l.x + l.w >= b.x && l.x - l.w <= b.x + b.w && l.y <= b.y + b.h && l.y + l.h >= b.y) {
            damageBrick(b, { x: l.x, y: l.y }, false);
            l.alive = false;
            break;
          }
        }
      }
      game.lasers = game.lasers.filter((l) => l.alive);
    }

    function updatePowerups(dt) {
      for (const p of game.powerups) {
        if (!p.alive) continue;
        p.y += p.vy * dt;
        if (p.y - p.h > H + H * 0.03) p.alive = false;

        const hit = p.x + p.w * 0.5 >= game.paddle.x && p.x - p.w * 0.5 <= game.paddle.x + game.paddle.w &&
          p.y + p.h * 0.5 >= game.paddle.y && p.y - p.h * 0.5 <= game.paddle.y + game.paddle.h;

        if (hit) {
          p.alive = false;
          applyPowerup(p.type);
        }
      }
      game.powerups = game.powerups.filter((p) => p.alive);
    }

    function updateDifficulty(dt) {
      if (game.state !== "playing") return;
      game.nextSpeedTick -= dt;
      if (game.nextSpeedTick <= 0) {
        for (const b of game.balls) {
          if (b.stuck) continue;
          const mag = Math.hypot(b.vx, b.vy);
          const next = mag + metrics.speedRamp;
          const a = Math.atan2(b.vy, b.vx);
          b.vx = Math.cos(a) * next;
          b.vy = Math.sin(a) * next;
        }
        game.nextSpeedTick = 5.4;
      }
    }

    function updateFX(dt) {
      for (const p of game.particles) {
        p.t += dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += H * 0.28 * dt;
      }
      game.particles = game.particles.filter((p) => p.t < p.life);

      for (const t of game.trails) t.t += dt;
      game.trails = game.trails.filter((t) => t.t < t.life);

      for (const p of game.popups) {
        p.t += dt;
        p.y -= H * 0.06 * dt;
      }
      game.popups = game.popups.filter((p) => p.t < p.life);

      if (game.shake > 0) game.shake -= dt;
      if (game.flash > 0) game.flash -= dt * 0.9;
    }

    // -----------------------------
    // Rendering
    // -----------------------------
    function renderBackground() {
      ctx.drawImage(game.assets.bg, 0, 0, W, H);
      const t = performance.now() * 0.001;
      for (const s of game.twinkles) {
        const a = 0.2 + ((Math.sin(t * s.speed + s.phase) + 1) * 0.25);
        ctx.fillStyle = `rgba(210,235,255,${a})`;
        ctx.fillRect(s.x, s.y, s.s, s.s);
      }
    }

    function renderBricks() {
      const pulseOn = ((performance.now() / 300) | 0) % 2 === 0;
      for (const b of game.bricks) {
        if (!b.alive) continue;
        const sprite = game.assets.brickSprites[b.type];
        ctx.drawImage(sprite, b.x, b.y, b.w, b.h);

        if (b.type === "Cursed") {
          ctx.strokeStyle = pulseOn ? "rgba(0,210,255,0.85)" : "rgba(0,210,255,0.42)";
          ctx.lineWidth = Math.max(1, W * 0.004);
          ctx.strokeRect(b.x, b.y, b.w, b.h);
        }

        if (b.hp < b.maxHp && b.maxHp > 1) {
          const stage = clamp((b.maxHp - b.hp) - 1, 0, 2);
          ctx.drawImage(game.assets.cracks[stage], b.x, b.y, b.w, b.h);
        }

        const icon = BRICKS[b.type].icon;
        if (icon) {
          ctx.fillStyle = "rgba(230,245,255,0.92)";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `bold ${Math.max(10, W * 0.03)}px Trebuchet MS, sans-serif`;
          ctx.fillText(icon, b.x + b.w * 0.5, b.y + b.h * 0.56);
        }
      }
    }

    function renderPaddle() {
      ctx.drawImage(game.assets.paddle, game.paddle.x, game.paddle.y, game.paddle.w, game.paddle.h);

      if (game.shieldActive) {
        const y = H - H * 0.015;
        ctx.strokeStyle = "rgba(120,230,255,0.85)";
        ctx.lineWidth = Math.max(2, W * 0.005);
        ctx.beginPath();
        ctx.moveTo(W * 0.03, y);
        ctx.lineTo(W * 0.97, y);
        ctx.stroke();
      }
    }

    function renderBalls() {
      for (const t of game.trails) {
        const a = 1 - t.t / t.life;
        ctx.fillStyle = `rgba(180,225,255,${a * 0.5})`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * (0.55 + 0.35 * a), 0, Math.PI * 2);
        ctx.fill();
      }

      const bw = game.assets.ball.width;
      const bh = game.assets.ball.height;
      for (const b of game.balls) {
        ctx.drawImage(game.assets.ball, b.x - bw * 0.5, b.y - bh * 0.5);
      }
    }

    function renderLasers() {
      ctx.fillStyle = "#bce9ff";
      for (const l of game.lasers) {
        ctx.fillRect(l.x - l.w * 0.5, l.y, l.w, l.h);
      }
    }

    function renderPowerups() {
      for (const p of game.powerups) {
        const def = POWERUPS[p.type];
        ctx.fillStyle = def.negative ? "#ff4b4b" : def.color;
        roundRectPath(ctx, p.x - p.w * 0.5, p.y - p.h * 0.5, p.w, p.h, Math.max(4, p.h * 0.3));
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fillRect(p.x - p.w * 0.42, p.y - p.h * 0.5, p.w * 0.84, Math.max(2, p.h * 0.22));
        ctx.fillStyle = "#0a0e2e";
        ctx.font = `bold ${Math.max(9, W * 0.025)}px Trebuchet MS, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(`${def.emoji} ${def.name}`, p.x, p.y);
      }
    }

    function renderParticlesAndPopups() {
      for (const p of game.particles) {
        const a = 1 - p.t / p.life;
        ctx.fillStyle = withAlpha(p.color, a);
        ctx.fillRect(p.x, p.y, p.s, p.s);
      }

      for (const s of game.popups) {
        const a = 1 - s.t / s.life;
        ctx.fillStyle = `rgba(215,240,255,${a})`;
        ctx.font = `bold ${Math.max(11, W * 0.034)}px Trebuchet MS, sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(s.txt, s.x, s.y);
      }
    }

    function renderCombo() {
      if (game.comboMulti < 2 && game.comboFlash <= 0) return;
      const a = game.comboFlash > 0 ? 0.65 : 0.35;
      ctx.fillStyle = `rgba(200,235,255,${a})`;
      ctx.font = `bold ${Math.max(16, W * 0.07)}px Trebuchet MS, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(`x${game.comboMulti} COMBO!`, W * 0.5, H * 0.56);
    }

    function renderStickyPrompt() {
      const stuck = game.balls.find((b) => b.stuck);
      if (!stuck) return;
      const pulse = 0.45 + ((Math.sin(performance.now() * 0.012) + 1) * 0.25);
      ctx.fillStyle = `rgba(210,240,255,${pulse})`;
      ctx.font = `bold ${Math.max(10, W * 0.03)}px Trebuchet MS, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText("TAP TO LAUNCH", stuck.x, stuck.y - H * 0.03);
    }

    function renderActivePowerBar() {
      const entries = [];
      for (const k of Object.keys(game.powerTimers)) {
        const t = game.powerTimers[k];
        if (t > 0 && POWERUPS[k]) entries.push({ type: k, t, max: game.powerMax[k] || 1 });
      }
      if (game.powerState.stickyPaddle) entries.push({ type: "sticky", t: 1, max: 1 });
      if (game.powerState.bombArmed) entries.push({ type: "bomb", t: 1, max: 1 });
      if (game.shieldActive) entries.push({ type: "shield", t: game.powerState.shieldCharges, max: Math.max(1, game.powerState.shieldMaxCharges) });
      if (!entries.length) return;

      const boxW = W * 0.14;
      const boxH = H * 0.038;
      const gap = W * 0.012;
      const total = entries.length * boxW + (entries.length - 1) * gap;
      let x = clamp(game.paddle.x + game.paddle.w * 0.5 - total * 0.5, W * 0.02, W - total - W * 0.02);
      const y = game.paddle.y - H * 0.07;

      for (const e of entries) {
        const d = POWERUPS[e.type];
        ctx.fillStyle = "rgba(8,18,50,0.86)";
        ctx.strokeStyle = "rgba(0,180,255,0.35)";
        roundRectPath(ctx, x, y, boxW, boxH, Math.max(4, boxH * 0.25));
        ctx.fill();
        ctx.strokeRect(x, y, boxW, boxH);

        ctx.fillStyle = d.color;
        ctx.font = `bold ${Math.max(9, W * 0.025)}px Trebuchet MS, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(d.emoji, x + boxW * 0.2, y + boxH * 0.48);

        const ratio = clamp(e.t / e.max, 0, 1);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fillRect(x + boxW * 0.08, y + boxH * 0.74, boxW * 0.84, Math.max(2, H * 0.004));
        ctx.fillStyle = d.color;
        ctx.fillRect(x + boxW * 0.08, y + boxH * 0.74, boxW * 0.84 * ratio, Math.max(2, H * 0.004));

        x += boxW + gap;
      }
    }

    function render() {
      ctx.save();
      if (game.shake > 0) {
        const m = game.shake * W * 0.01;
        ctx.translate(rand(-m, m), rand(-m, m));
      }

      renderBackground();
      renderBricks();
      renderLasers();
      renderPaddle();
      renderBalls();
      renderPowerups();
      renderParticlesAndPopups();
      renderActivePowerBar();
      renderCombo();
      renderStickyPrompt();
      if (game.flash > 0) {
        ctx.fillStyle = `rgba(140,210,255,${game.flash})`;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();
    }

    // -----------------------------
    // Main Loop
    // -----------------------------
    let prev = performance.now();

    function loop(ts) {
      const dt = Math.min(0.033, (ts - prev) * 0.001);
      prev = ts;

      updateDrift(dt);

      if (!game.paused) {
        updateTimers(dt);
        if (game.state === "playing") {
          updateBalls(dt);
          updateLasers(dt);
          updatePowerups(dt);
          updateDifficulty(dt);
          maybeRegenerate(dt);
        } else {
          updateLasers(dt);
          updatePowerups(dt);
        }
      }

      updateFX(dt);
      render();
      requestAnimationFrame(loop);
    }

    // -----------------------------
    // Events
    // -----------------------------
    window.addEventListener("resize", resize, { passive: true });

    canvas.addEventListener("mousedown", (e) => {
      setPointer(e.clientX);
      onPress();
    });

    window.addEventListener("mousemove", (e) => setPointer(e.clientX), { passive: true });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      setPointer(t.clientX);
      onPress();
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      setPointer(t.clientX);
    }, { passive: false });

    document.addEventListener("gesturestart", (e) => e.preventDefault());
    document.addEventListener("dblclick", (e) => e.preventDefault());

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") { e.preventDefault(); onPress(); }
      if (e.code === "KeyP") togglePause();
      if (e.code === "KeyM") {
        Audio.muted = !Audio.muted;
        updateHUD();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && !game.paused && game.state !== "gameOver") {
        saveGame();
        showOverlay("Paused", "Tab hidden. Tap Resume when back.", [
          { label: "Resume", onClick: () => hideOverlay() },
          { label: "Restart", onClick: () => restartImmediate() }
        ]);
      }
    });

    function togglePause() {
      if (game.state === "gameOver") return;
      if (overlay.classList.contains("show")) {
        hideOverlay();
      } else {
        showOverlay("Paused", "Game is paused.", [
          { label: "Resume", onClick: () => hideOverlay() },
          { label: "Restart", onClick: () => restartImmediate() }
        ]);
      }
    }

    muteBtn.addEventListener("click", () => {
      Audio.muted = !Audio.muted;
      updateHUD();
    });

    pauseBtn.addEventListener("click", togglePause);
    restartBtn.addEventListener("click", () => restartImmediate());

    // -----------------------------
    // Boot
    // -----------------------------
    function boot() {
      resize();
      updateHUD();
      loadLevel(1, false);

      const saved = loadSave();
      const seen = localStorage.getItem(STORAGE_SEEN) === "1";

      if (saved) {
        restoreFromSave(saved);
      } else if (!seen) {
        showOverlay("Neon Breakout", "Drag paddle to move. Tap to launch.", [
          {
            label: "Start",
            onClick: () => {
              localStorage.setItem(STORAGE_SEEN, "1");
              restartImmediate();
            }
          }
        ]);
      } else {
        restartImmediate();
      }

      requestAnimationFrame(loop);
    }

    boot();
  </script>
</body>
</html>
